# Dagster server infrastructure for knowledge-pipeline.
#
# Usage:
#   docker compose up -d
#   docker compose down
#
# UI:  http://localhost:3000

services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_USER: dagster
      POSTGRES_PASSWORD: dagster
      POSTGRES_DB: dagster
    volumes:
      - dagster_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dagster"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  dagster-webserver:
    image: dagster/dagster-k8s:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DAGSTER_HOME: /opt/dagster/dagster_home
      DAGSTER_PG_HOST: postgres
      DAGSTER_PG_PORT: 5432
      DAGSTER_PG_USERNAME: dagster
      DAGSTER_PG_PASSWORD: dagster
      DAGSTER_PG_DB: dagster
    ports:
      - "${APP_HOST:-127.0.0.1}:3000:3000"
    restart: unless-stopped

  dagster-daemon:
    image: dagster/dagster-k8s:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DAGSTER_HOME: /opt/dagster/dagster_home
      DAGSTER_PG_HOST: postgres
      DAGSTER_PG_PORT: 5432
      DAGSTER_PG_USERNAME: dagster
      DAGSTER_PG_PASSWORD: dagster
      DAGSTER_PG_DB: dagster
    restart: unless-stopped

volumes:
  dagster_postgres:
