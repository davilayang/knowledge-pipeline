# Dagster server infrastructure for knowledge-pipeline.
#
# Usage:
#   docker compose up --build
#   docker compose down --volumes
#
# UI:  http://localhost:3000
#
# After code changes, rebuild and restart the code server:
#   docker compose up --build dagster-code
#
# For local dev, skip Docker and use `uv run poe dev` which auto-reloads.

services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_USER: ${DAGSTER_PG_USERNAME}
      POSTGRES_PASSWORD: ${DAGSTER_PG_PASSWORD}
      POSTGRES_DB: ${DAGSTER_PG_DB}
    volumes:
      - dagster_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dagster_network
    restart: unless-stopped

  dagster-code:
    build:
      context: .
      dockerfile: docker/code/Dockerfile
    image: knowledge_pipeline_code
    environment:
      DAGSTER_POSTGRES_USER: ${DAGSTER_PG_USERNAME}
      DAGSTER_POSTGRES_PASSWORD: ${DAGSTER_PG_PASSWORD}
      DAGSTER_POSTGRES_DB: ${DAGSTER_PG_DB}
      DAGSTER_CURRENT_IMAGE: knowledge_pipeline_code
    volumes:
      - ./data:/app/data
      - ./datasets:/app/datasets
    ports:
      - "4000:4000"
    networks:
      - dagster_network
    healthcheck:
      test: ["CMD", "/app/.venv/bin/dagster", "api", "grpc-health-check", "-p", "4000"]
      timeout: 1s
      interval: 5s
      retries: 20
      start_period: 30s
    restart: on-failure

  dagster-webserver:
    build:
      context: .
      dockerfile: docker/dagster/Dockerfile
    entrypoint:
      - dagster-webserver
      - -h
      - "0.0.0.0"
      - -p
      - "3000"
      - -w
      - /opt/dagster/home/workspace.yaml
    depends_on:
      postgres:
        condition: service_healthy
      dagster-code:
        condition: service_healthy
    environment:
      DAGSTER_PG_HOST: postgres
      DAGSTER_PG_PORT: ${DAGSTER_PG_PORT}
      DAGSTER_PG_USERNAME: ${DAGSTER_PG_USERNAME}
      DAGSTER_PG_PASSWORD: ${DAGSTER_PG_PASSWORD}
      DAGSTER_PG_DB: ${DAGSTER_PG_DB}
    ports:
      - "${APP_HOST:-127.0.0.1}:3000:3000"
    networks:
      - dagster_network
    restart: unless-stopped

  dagster-daemon:
    build:
      context: .
      dockerfile: docker/dagster/Dockerfile
    entrypoint:
      - dagster-daemon
      - run
      - -w
      - /opt/dagster/home/workspace.yaml
    depends_on:
      postgres:
        condition: service_healthy
      dagster-code:
        condition: service_healthy
    environment:
      DAGSTER_PG_HOST: postgres
      DAGSTER_PG_PORT: ${DAGSTER_PG_PORT}
      DAGSTER_PG_USERNAME: ${DAGSTER_PG_USERNAME}
      DAGSTER_PG_PASSWORD: ${DAGSTER_PG_PASSWORD}
      DAGSTER_PG_DB: ${DAGSTER_PG_DB}
    networks:
      - dagster_network
    restart: on-failure

networks:
  dagster_network:
    driver: bridge
    name: dagster_network

volumes:
  dagster_postgres:
