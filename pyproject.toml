[project]
name = "knowledge-pipeline"
version = "0.1.0"
description = "Prefect-based orchestrator for newsletter knowledge indexing and backup"
requires-python = ">=3.13"
dependencies = [
    "prefect>=3.0,<4.0",
    "chromadb>=0.6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/knowledge_pipeline"]

[tool.poe.tasks]
index = { cmd = "python -m knowledge_pipeline index-knowledge", help = "Index raw_store content into ChromaDB" }
backup = { cmd = "python -m knowledge_pipeline backup", help = "Backup newsletter-assistant databases" }
check = ["fmt", "lint"]
fmt = { cmd = "black src/" }
lint = { cmd = "ruff check src/" }
"fmt-fix" = { cmd = "black src/" }
"lint-fix" = { cmd = "ruff check --fix src/" }

[tool.black]
line-length = 100
target-version = ["py313"]

[tool.ruff]
line-length = 100
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
