# Strategy configurations for the knowledge pipeline.
# Single source of truth for index strategies, retrieval strategies, and eval combos.

# ---------------------------------------------------------------------------
# Eval combos — which (collection x retrieval) pairs to evaluate.
# Format: "collection_name__retrieval_strategy"
# ---------------------------------------------------------------------------

eval_combos:
  - baseline__cosine
  - baseline__rerank
  - baseline__hybrid
  - baseline__rerank_hybrid
  - recursive_minilm__cosine
  - recursive_minilm__rerank
  - recursive_minilm__hybrid
  - recursive_minilm__rerank_hybrid
  - bge__cosine
  - bge__rerank
  - bge__hybrid
  - bge__rerank_hybrid

# ---------------------------------------------------------------------------
# Index strategies — how content is chunked, embedded, and stored.
# Format: idx_{chunking}_{embedding}
# ---------------------------------------------------------------------------

index_strategies:
  idx_markdown_minilm:
    description: >
      Baseline strategy. Markdown-aware chunking splits on heading boundaries
      with paragraph packing up to 800 tokens. Embeds with all-MiniLM-L6-v2
      (MTEB ~49, 256 token context). Title and author are prepended before
      embedding for disambiguation. This is the control experiment — all
      other strategies are compared against it.
    collection_name: baseline
    chunking: markdown
    chunk_size: 800
    chunk_overlap: 100
    embedding_model: all-MiniLM-L6-v2

  idx_recursive_minilm:
    description: >
      Recursive character splitting with MiniLM embeddings. Uses
      RecursiveCharacterTextSplitter which tries larger separators first
      (\n\n, \n, space) before falling back to smaller ones. Tests whether
      simple recursive splitting performs comparably to markdown-aware
      splitting — fewer assumptions about document structure.
    collection_name: recursive_minilm
    chunking: recursive
    chunk_size: 800
    chunk_overlap: 100
    embedding_model: all-MiniLM-L6-v2

  idx_markdown_bge:
    description: >
      Same markdown chunking as baseline but with an upgraded embedding model.
      BGE-small-en-v1.5 scores MTEB ~62 (vs MiniLM's ~49) with 512 token
      context (vs 256). Tests whether a better embedding model improves
      retrieval quality without changing the chunking strategy. Lowest-effort
      index-level improvement.
    collection_name: bge
    chunking: markdown
    chunk_size: 800
    chunk_overlap: 100
    embedding_model: BAAI/bge-small-en-v1.5

# ---------------------------------------------------------------------------
# Retrieval strategies — how queries are run against a collection.
# These live in lib/retrieval/ and are registered in registry.py.
# ---------------------------------------------------------------------------

retrieval_strategies:
  cosine:
    description: >
      Basic cosine similarity via ChromaDB's built-in query. Embeds the query
      with the same model as the collection, returns top-K by distance.
      Fast (~130ms) but no semantic reranking. The retrieval baseline.

  rerank:
    description: >
      Two-stage retrieval. First retrieves 4x candidates via cosine similarity,
      then re-scores each (query, document) pair with a cross-encoder
      (cross-encoder/ms-marco-MiniLM-L-6-v2, 22M params). Improves ranking
      quality (MRR) at the cost of latency (~700ms). The cross-encoder uses
      joint attention to "read" query and document together.
    model: cross-encoder/ms-marco-MiniLM-L-6-v2
    candidate_factor: 4

  hybrid:
    description: >
      Two-source retrieval. Runs BM25 sparse search and dense vector search in
      parallel, then merges via Reciprocal Rank Fusion (RRF). BM25 catches
      exact keyword matches that embedding-only search misses. The BM25 corpus
      is built lazily from the ChromaDB collection's stored documents.
    candidate_factor: 4
    rrf_k: 60

  rerank_hybrid:
    description: >
      Three-stage retrieval. First runs hybrid (BM25 + vector + RRF) to produce
      candidates with both keyword and semantic signal, then reranks with a
      cross-encoder. Combines hybrid's keyword precision with rerank's semantic
      reordering. Expected to fix hybrid's cross-topic regression while keeping
      its strength on exact-term and buried-fact queries.
    model: cross-encoder/ms-marco-MiniLM-L-6-v2
    candidate_factor: 4
    rrf_k: 60

  # Future:
  # hyde:
  #   description: Generate hypothetical answer with LLM, embed that instead of the query.
