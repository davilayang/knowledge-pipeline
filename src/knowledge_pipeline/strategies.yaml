# Index strategy configurations.
# Each strategy defines how content is chunked, embedded, and stored.
#
# Format: idx_{chunking}_{embedding}
# Keys:
#   collection_name  — ChromaDB collection name
#   embedding_model  — SentenceTransformer model name (null = ChromaDB default MiniLM-L6-v2)

rag_0_baseline:
  collection_name: baseline
  embedding_model: null

idx_markdown_bge:
  collection_name: bge
  embedding_model: BAAI/bge-small-en-v1.5
